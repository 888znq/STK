<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAK PANEL · BTC/USD</title>
<style>
  :root{--bg:#000432;--g:#2ED573;--r:#E63946;--tx:#E2E8F0;--bd:#ffffff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column;}
  #bar{display:flex;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
  #bar input,#bar button{background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:2px;padding:6px 8px;font-family:inherit;font-weight:700;font-size:12px;}
  #bar input#cycleInput{width:70px;}
  #bar button{cursor:pointer;color:var(--g);}
  #status{font-size:10px;color:#aaa;margin-left:auto;}
  #sub{font-size:9px;color:#888;letter-spacing:1px;padding:2px 10px;border-bottom:1px solid #222;}
  #panel{flex:1;overflow-y:auto;width:220px;max-width:100%;}
  .row{display:flex;height:22px;border-bottom:1px solid #222;font-size:11px;font-weight:700;cursor:pointer;}
  .row:hover{background:#050a55;}
  .idx,.rc,.gc{flex:1;display:flex;align-items:center;justify-content:center;}
  .idx{flex:0 0 34px;color:#fff;border-right:1px solid #222;}
  .rc{color:var(--r);border-right:1px solid #222;}
  .gc{color:var(--g);}
  #modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,4,50,.85);align-items:center;justify-content:center;z-index:50;}
  #modalBox{background:var(--bg);border:1px solid var(--bd);width:90vw;max-width:340px;max-height:70vh;display:flex;flex-direction:column;border-radius:2px;}
  #modalHead{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;}
  #modalHead span:last-child{cursor:pointer;}
  #modalBody{display:flex;flex:1;overflow:hidden;}
  #modalR,#modalG{flex:1;overflow-y:auto;padding:6px;}
  #modalR{border-right:1px solid #333;}
  .mrow{display:flex;justify-content:space-between;font-size:11px;font-weight:700;padding:4px 2px;border-bottom:1px solid #222;}
    #top5Overlay{display:none;position:fixed;inset:0;background:rgba(0,4,50,.85);align-items:center;justify-content:center;z-index:60;}
    #top5Box{background:var(--bg);border:1px solid var(--bd);width:90vw;max-width:340px;max-height:70vh;display:flex;flex-direction:column;border-radius:2px;}
    #top5Head{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;}
    #top5Head span:last-child{cursor:pointer;}
    #top5Body{flex:1;overflow-y:auto;padding:6px;}
    #x3x4Overlay{display:none;position:fixed;inset:0;background:rgba(0,4,50,.85);align-items:center;justify-content:center;z-index:60;}
    #x3x4Box{background:var(--bg);border:1px solid var(--bd);width:90vw;max-width:360px;max-height:70vh;display:flex;flex-direction:column;border-radius:2px;}
    #x3x4Head{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;}
    #x3x4Head span:last-child{cursor:pointer;}
    #x3x4Body{flex:1;overflow-y:auto;padding:6px;}
    .x3x4Sec{font-size:10px;color:#888;letter-spacing:1px;padding:6px 2px 2px;}
    .x3x4Row{display:flex;justify-content:space-between;font-size:11px;font-weight:700;padding:4px 2px;border-bottom:1px solid #222;}
    .x3x4Hl{border:1px solid #ffe45c;border-radius:2px;padding:1px 4px;}
  </style>
</head>
<body>
  <div id="bar">
    <input type="date" id="dateInput" onchange="loadDate(this.value).then(scanX3X4)">
    <input type="number" id="cycleInput" value="132" min="2" max="1440" onchange="computeAndRender()">
    <button onclick="loadDate(document.getElementById('dateInput').value)">LOAD</button>
        <button onclick="findTop5X3Diff()" style="display:none">TOP 5 Δ</button>
        <button onclick="scanX3X4()">SHIFTS Δ</button>
        <span id="status">idle</span>
  </div>
  <div id="sub">BTC/USD · 6:30–10:30pm IST SESSION · CYCLE = SEC/ROW</div>
  <div id="panel"></div>

  <div id="modalOverlay" onclick="if(event.target===this) closeModal()">
      <div id="modalBox">
        <div id="modalHead"><span id="modalTitle">ROW</span><span onclick="closeModal()">✕</span></div>
        <div id="modalBody">
          <div id="modalR"></div>
          <div id="modalG"></div>
        </div>
      </div>
    </div>
  
    <div id="top5Overlay" onclick="if(event.target===this) closeTop5()">
      <div id="top5Box">
        <div id="top5Head"><span>TOP 5 · X3 R/G DIFF · CYCLE <span id="top5Cycle"></span></span><span onclick="closeTop5()">✕</span></div>
        <div id="top5Body"></div>
      </div>
    </div>
  
    <div id="x3x4Overlay" onclick="if(event.target===this) closeX3X4()">
      <div id="x3x4Box">
        <div id="x3x4Head"><span>SHIFT SCAN · BEST PER LEVEL</span><span onclick="closeX3X4()">✕</span></div>
        <div id="x3x4Body"></div>
      </div>
    </div>
  
  <script>
const SESSION_SEC = 14400; // fixed session = 6:30–10:30pm IST (13:00–17:00 UTC)
let prices = new Array(SESSION_SEC).fill(-1);
let histR = [], histG = [];

document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
function status(t){ document.getElementById('status').textContent = t; }

function fetchChunk(s, e){
  return new Promise(res=>{
    const ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    const t = setTimeout(()=>{ try{ws.close();}catch(x){} res({}); }, 20000);
    ws.onopen = ()=> ws.send(JSON.stringify({ ticks_history:'cryBTCUSD', start:s, end:e, count:5000, style:'ticks' }));
    ws.onmessage = ev=>{
      clearTimeout(t);
      let d; try{ d = JSON.parse(ev.data); }catch(x){ d = {}; }
      const m = {};
      if (d.history) { for (let i=0;i<d.history.times.length;i++) m[d.history.times[i]] = d.history.prices[i]; }
      try{ ws.close(); }catch(x){}
      res(m);
    };
    ws.onerror = ()=>{ clearTimeout(t); try{ws.close();}catch(x){} res({}); };
  });
}

async function loadDate(dateStr){
  const [Y,M,D] = dateStr.split('-').map(Number);
  const startTs = Date.UTC(Y, M-1, D, 13, 0, 0) / 1000; // 13:00 UTC = 6:30pm IST session start
  const endTs = startTs + SESSION_SEC - 1;
  const nowTs = Math.floor(Date.now()/1000);
  const fetchEnd = Math.min(endTs, nowTs);

  prices = new Array(SESSION_SEC).fill(-1);
  let got = 0;

  for (let s = startTs; s <= fetchEnd; s += 3600) {
    const e = Math.min(s + 3599, fetchEnd);
    status('fetching ' + new Date(s*1000).toISOString().slice(11,16) + 'Z...');
    const map = await fetchChunk(s, e);
    for (const ts in map) {
      const idx = ts - startTs;
      if (idx >= 0 && idx < SESSION_SEC) { prices[idx] = map[ts]; got++; }
    }
  }

  computeAndRender();
  status(got > 0 ? (got + ' ticks loaded') : 'no data for this window');
}

function computeAndRender(){
  const CYCLE = Math.max(2, parseInt(document.getElementById('cycleInput').value) || 60);
  const numCols = Math.ceil(prices.length / CYCLE);
  histR = Array.from({length:CYCLE}, ()=>({}));
  histG = Array.from({length:CYCLE}, ()=>({}));

  // Pass 1 state: previous column's cell {c,s,p} per row (drives the color/streak formula)
  let prevCells = new Array(CYCLE).fill(null);
  // Pass 2 state: independent "last recorded" tracker per row (drives the histogram)
  const curColor = new Array(CYCLE).fill('N');
  const curStreak = new Array(CYCLE).fill(0);

  for (let col = 0; col < numCols; col++) {
    const thisCells = new Array(CYCLE).fill(null);
    for (let r = 0; r < CYCLE; r++) {
      const idx = col * CYCLE + r;
      if (idx >= prices.length) { curStreak[r] = 0; curColor[r] = 'N'; continue; }

      const p = prices[idx];
      const prev = prevCells[r];
      let sc, sl;
      if (prev) {
        if (p === -1) { sc = 'N'; sl = 0; }
        else if (p > prev.p) { sc = 'G'; sl = prev.c === 'G' ? prev.s + 1 : 1; }
        else if (p < prev.p) { sc = 'R'; sl = prev.c === 'R' ? prev.s + 1 : 1; }
        else { sc = prev.c; sl = 0; }
      } else {
        sc = (p === -1) ? 'N' : 'G';
        sl = (p === -1) ? 0 : 1;
      }
      thisCells[r] = { c: sc, s: sl, p: p };

      // a streak is only ever logged when a FRESH streak (s===1) begins — a plain gap
      // (s===0) resets the tracker to N/0 without recording, same as the original.
      if (curStreak[r] > 0 && curColor[r] !== 'N' && sl === 1) {
        const h = curColor[r] === 'G' ? histG[r] : histR[r];
        h[curStreak[r]] = (h[curStreak[r]] || 0) + 1;
      }
      curColor[r] = sl > 0 ? sc : 'N';
      curStreak[r] = sl;
    }
    prevCells = thisCells;
  }

  for (let r = 0; r < CYCLE; r++) {
    if (curStreak[r] > 0 && curColor[r] !== 'N') {
      const h = curColor[r] === 'G' ? histG[r] : histR[r];
      h[curStreak[r]] = (h[curStreak[r]] || 0) + 1;
    }
  }

  let html = '';
  for (let r = 0; r < CYCLE; r++) {
    const rKeys = Object.keys(histR[r]).map(Number);
    const gKeys = Object.keys(histG[r]).map(Number);
    const rM = rKeys.length ? Math.max(...rKeys) : 0;
    const gM = gKeys.length ? Math.max(...gKeys) : 0;
    html += '<div class="row" onclick="openModal('+r+')"><span class="idx">'+r+'</span><span class="rc">'+(rM?('x'+rM):'·')+'</span><span class="gc">'+(gM?('x'+gM):'·')+'</span></div>';
  }
  document.getElementById('panel').innerHTML = html;
}

function applyCumulative(hist){
  const keys = Object.keys(hist).map(Number);
  const maxS = keys.length ? Math.max(...keys) : 0;
  let cum = 0, res = {};
  for (let i = maxS; i >= 1; i--) { cum += (hist[i] || 0); if (cum > 0) res[i] = cum; }
  return res;
}

function toRows(cumHist){
  return Object.keys(cumHist).map(k=>{
    const s = +k, c = cumHist[k], prevC = cumHist[s-1];
    const pct = (s > 1 && prevC) ? (100 - Math.round(c/prevC*100)) + '%' : 'BASE';
    return { s, c, pct };
  }).sort((a,b)=>b.s-a.s);
}

function rowsHtml(rows, color){
  if (!rows.length) return '<div class="mrow" style="color:#888">No data</div>';
  return rows.map(i=>'<div class="mrow" style="color:'+color+'"><span>X'+i.s+'</span><span>'+i.pct+'</span><span>'+i.c+'×</span></div>').join('');
}

function openModal(r){
  document.getElementById('modalTitle').textContent = 'ROW ' + r;
  document.getElementById('modalR').innerHTML = rowsHtml(toRows(applyCumulative(histR[r]||{})), 'var(--r)');
  document.getElementById('modalG').innerHTML = rowsHtml(toRows(applyCumulative(histG[r]||{})), 'var(--g)');
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal(){ document.getElementById('modalOverlay').style.display = 'none'; }

function findTop5X3Diff(){
  const CYCLE = histR.length;
  const results = [];
  for (let r = 0; r < CYCLE; r++) {
    const rCount = (histR[r] && histR[r][3]) || 0;
    const gCount = (histG[r] && histG[r][3]) || 0;
    const diff = rCount - gCount;
    results.push({ row:r, rCount, gCount, diff:Math.abs(diff), bias: diff>0?'R':(diff<0?'G':'-') });
  }
  results.sort((a,b)=> b.diff - a.diff);
  const top5 = results.slice(0,5);
  document.getElementById('top5Cycle').textContent = CYCLE;
  document.getElementById('top5Body').innerHTML = top5.map(t=>{
    const color = t.bias==='R' ? 'var(--r)' : (t.bias==='G' ? 'var(--g)' : '#888');
    return '<div class="mrow" style="color:'+color+'"><span>ROW '+t.row+'</span><span>R'+t.rCount+' / G'+t.gCount+'</span><span>Δ'+t.diff+'</span></div>';
  }).join('') || '<div class="mrow" style="color:#888">No data</div>';
  document.getElementById('top5Overlay').style.display = 'flex';
}
function closeTop5(){ document.getElementById('top5Overlay').style.display = 'none'; }

function pctAt(cumHist, s){
  const c = cumHist[s];
  const prevC = cumHist[s-1];
  if (s <= 1 || c === undefined || !prevC) return null;
  return 100 - Math.round(c/prevC*100);
}

function scanX3X4(){
  const CYCLE = histR.length;
  const levels = [
    {a:2, b:3, label:'X2→X3'},
    {a:3, b:4, label:'X3→X4'},
    {a:4, b:5, label:'X4→X5'}
  ];
  function bestForLevel(a, b){
    const results = [];
    for (let r = 0; r < CYCLE; r++){
      const cumR = applyCumulative(histR[r]||{});
      const cumG = applyCumulative(histG[r]||{});
      const pRa = pctAt(cumR, a), pRb = pctAt(cumR, b);
      const pGa = pctAt(cumG, a), pGb = pctAt(cumG, b);
      if (pRa !== null && pRb !== null) results.push({row:r, color:'R', pctA:pRa, pctB:pRb, cntA:cumR[a]||0, cntB:cumR[b]||0, diff:pRb-pRa});
      if (pGa !== null && pGb !== null) results.push({row:r, color:'G', pctA:pGa, pctB:pGb, cntA:cumG[a]||0, cntB:cumG[b]||0, diff:pGb-pGa});
    }
    results.sort((x,y)=>y.diff-x.diff);
    return results[0] || null;
  }
  function line(t, a, b){
    if (!t) return '<div class="x3x4Row" style="color:#888">No data</div>';
    const col = t.color==='R' ? 'var(--r)' : 'var(--g)';
    return '<div class="x3x4Row" style="color:'+col+'"><span>ROW '+t.row+' ('+t.color+')</span><span class="x3x4Hl">X'+a+' '+t.pctA+'% '+t.cntA+'× → X'+b+' '+t.pctB+'% '+t.cntB+'×</span><span>Δ'+(t.diff>0?'+':'')+t.diff+'</span></div>';
  }
  let html = '';
  for (const lvl of levels){
    const best = bestForLevel(lvl.a, lvl.b);
    html += '<div class="x3x4Sec">'+lvl.label+' · BEST</div>' + line(best, lvl.a, lvl.b);
  }
  document.getElementById('x3x4Body').innerHTML = html;
  document.getElementById('x3x4Overlay').style.display = 'flex';
}
function closeX3X4(){ document.getElementById('x3x4Overlay').style.display = 'none'; }

loadDate(document.getElementById('dateInput').value);
</script>
</body>
</html>
